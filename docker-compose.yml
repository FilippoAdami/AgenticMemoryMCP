version: '3.8'

services:
  vault-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vault-service
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - VAULT_PATH=/vault
      - SEARXNG_URL=http://searxng:8080
      - GATEWAY_URL=http://host.docker.internal:11434/v1
      - EMBEDDING_MODEL=qwen3-embedding
    volumes:
      - /home/monday/Documents/MondayVault:/vault
    depends_on:
      - searxng
    networks:
      - monday-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    networks:
      - monday-network
    restart: unless-stopped

networks:
  monday-network:
    name: monday-network
    driver: bridge
